# Fly.io app config. Run `fly launch --no-deploy` once to pick a real app name
# and region, then `fly deploy`. Secrets are NOT stored here — see README/notes.
app = "chat-api-ahmed-2026-dd-dd"
primary_region = "fra"   # change to your closest region (e.g. cdg, ams, iad)

[build]
  dockerfile = "Dockerfile"

[env]
  AVATAR_DIR = "/data/avatars"

# Persistent disk for uploaded avatars — Fly's root FS is ephemeral and is
# wiped on every deploy/restart, so anything written to local disk must live
# on a mounted volume. Create it once: `fly volumes create chat_data --size 1`.
[mounts]
  source = "chat_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # keep 1 warm: WebSocket/STOMP sessions live in-memory

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  # Liveness/readiness against the public Actuator health endpoint.
  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "30s"
    method = "GET"
    path = "/actuator/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"   # bump to 1gb if you see OOM on startup
